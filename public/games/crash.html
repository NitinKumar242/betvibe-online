<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetVibe - Crash</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .game-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-header h1 {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .crash-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .multiplier-display {
            font-size: 5rem;
            font-weight: bold;
            color: #4ade80;
            transition: color 0.3s;
        }

        .multiplier-display.crashed {
            color: #f87171;
        }

        .multiplier-display.waiting {
            color: #a0a0a0;
        }

        .crash-graph {
            width: 100%;
            height: 200px;
            margin-top: 1rem;
        }

        .bet-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .bet-input {
            margin-bottom: 1rem;
        }

        .bet-input label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0a0a0;
        }

        .bet-input input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        .bet-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auto-cashout {
            margin-bottom: 1rem;
        }

        .auto-cashout label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #a0a0a0;
            cursor: pointer;
        }

        .auto-cashout input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        .auto-cashout input[type="number"] {
            width: 100px;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        .bet-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bet-btn:hover {
            transform: scale(1.02);
        }

        .bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cashout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #4ade80, #22c55e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cashout-btn:hover {
            transform: scale(1.02);
        }

        .cashout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-display {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .balance-display span {
            color: #4ade80;
            font-weight: bold;
        }

        .history {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .history h3 {
            margin-top: 0;
            color: #a0a0a0;
        }

        .history-list {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .history-item.win {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .history-item.loss {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .error-message {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .game-status {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .game-status.active {
            color: #4ade80;
        }

        .game-status.crashed {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Crash</h1>
            <p>Watch the multiplier grow and cash out before it crashes!</p>
        </div>

        <div class="balance-display">
            Balance: <span id="balance">0.00</span> INR
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="game-area">
            <div class="crash-display">
                <div class="game-status" id="gameStatus">Waiting for next round...</div>
                <div class="multiplier-display waiting" id="multiplierDisplay">1.00x</div>
                <canvas class="crash-graph" id="crashGraph"></canvas>
            </div>

            <div class="bet-panel">
                <div class="bet-input">
                    <label>Bet Amount (INR)</label>
                    <input type="number" id="betAmount" value="10" min="1" step="1">
                </div>

                <div class="auto-cashout">
                    <label>
                        <input type="checkbox" id="autoCashoutEnabled">
                        Auto Cashout at
                        <input type="number" id="autoCashoutValue" value="2.0" min="1.01" step="0.01" disabled>
                        x
                    </label>
                </div>

                <button class="bet-btn" id="betBtn" onclick="placeBet()">Place Bet</button>
                <button class="cashout-btn" id="cashoutBtn" onclick="cashout()" style="display: none;">Cash Out</button>
            </div>
        </div>

        <div class="history">
            <h3>Recent Results</h3>
            <div class="history-list" id="historyList">
                <p style="color: #a0a0a0;">No recent results</p>
            </div>
        </div>
    </div>

    <script>
        const GAME_SLUG = 'crash';
        let balance = 0;
        let history = [];
        let currentBet = null;
        let ws = null;
        let multiplier = 1.0;
        let gameActive = false;
        let graphData = [];

        // Load balance on page load
        async function loadBalance() {
            try {
                const response = await fetch('/api/wallet/balance');
                const data = await response.json();
                if (data.success) {
                    balance = data.balance;
                    document.getElementById('balance').textContent = balance.toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load balance:', error);
            }
        }

        // Connect to WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/crash`);

            ws.onopen = () => {
                console.log('Connected to Crash WebSocket');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };

            ws.onclose = () => {
                console.log('Disconnected from Crash WebSocket');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'game_start':
                    gameActive = true;
                    multiplier = 1.0;
                    graphData = [];
                    updateGameStatus('active', 'Game in progress...');
                    document.getElementById('multiplierDisplay').classList.remove('crashed', 'waiting');
                    document.getElementById('betBtn').style.display = 'none';
                    if (currentBet) {
                        document.getElementById('cashoutBtn').style.display = 'block';
                    }
                    break;

                case 'multiplier_update':
                    multiplier = data.multiplier;
                    document.getElementById('multiplierDisplay').textContent = multiplier.toFixed(2) + 'x';
                    graphData.push({ x: graphData.length, y: multiplier });
                    drawGraph();

                    // Check auto cashout
                    if (currentBet && document.getElementById('autoCashoutEnabled').checked) {
                        const autoCashoutValue = parseFloat(document.getElementById('autoCashoutValue').value);
                        if (multiplier >= autoCashoutValue) {
                            cashout();
                        }
                    }
                    break;

                case 'game_crash':
                    gameActive = false;
                    document.getElementById('multiplierDisplay').textContent = data.crash_point.toFixed(2) + 'x';
                    document.getElementById('multiplierDisplay').classList.add('crashed');
                    updateGameStatus('crashed', `Crashed at ${data.crash_point.toFixed(2)}x`);
                    document.getElementById('cashoutBtn').style.display = 'none';
                    document.getElementById('betBtn').style.display = 'block';

                    if (currentBet && !currentBet.cashed_out) {
                        // Lost the bet
                        currentBet = null;
                    }

                    addToHistory({ multiplier: data.crash_point, won: false });
                    break;

                case 'bet_placed':
                    currentBet = {
                        id: data.bet_id,
                        amount: data.amount,
                        cashed_out: false
                    };
                    break;

                case 'cashout':
                    if (currentBet && currentBet.id === data.bet_id) {
                        currentBet.cashed_out = true;
                        currentBet.cashout_multiplier = data.multiplier;
                        currentBet.payout = data.payout;
                        balance = data.new_balance;
                        document.getElementById('balance').textContent = balance.toFixed(2);
                        document.getElementById('cashoutBtn').style.display = 'none';
                        addToHistory({ multiplier: data.multiplier, won: true });
                    }
                    break;
            }
        }

        // Place bet
        async function placeBet() {
            const errorMessage = document.getElementById('errorMessage');
            const betAmount = parseFloat(document.getElementById('betAmount').value);

            if (isNaN(betAmount) || betAmount <= 0) {
                errorMessage.textContent = 'Invalid bet amount';
                errorMessage.classList.add('show');
                return;
            }

            if (betAmount > balance) {
                errorMessage.textContent = 'Insufficient balance';
                errorMessage.classList.add('show');
                return;
            }

            try {
                const response = await fetch(`/api/games/${GAME_SLUG}/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bet_amount: betAmount,
                        bet_data: {}
                    })
                });

                const data = await response.json();

                if (data.success) {
                    errorMessage.classList.remove('show');
                    // Bet will be confirmed via WebSocket
                } else {
                    throw new Error(data.error || 'Failed to place bet');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
            }
        }

        // Cash out
        async function cashout() {
            if (!currentBet || currentBet.cashed_out) {
                return;
            }

            try {
                const response = await fetch(`/api/games/${GAME_SLUG}/cashout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bet_id: currentBet.id
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to cash out');
                }
            } catch (error) {
                console.error('Cashout error:', error);
            }
        }

        // Update game status
        function updateGameStatus(status, message) {
            const statusEl = document.getElementById('gameStatus');
            statusEl.textContent = message;
            statusEl.className = 'game-status ' + status;
        }

        // Draw graph
        function drawGraph() {
            const canvas = document.getElementById('crashGraph');
            const ctx = canvas.getContext('2d');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (graphData.length < 2) return;

            ctx.beginPath();
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;

            const maxMultiplier = Math.max(...graphData.map(d => d.y));
            const xScale = canvas.width / (graphData.length - 1);
            const yScale = (canvas.height - 20) / maxMultiplier;

            graphData.forEach((point, index) => {
                const x = index * xScale;
                const y = canvas.height - (point.y * yScale) - 10;

                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();
        }

        // Add to history
        function addToHistory(result) {
            history.unshift(result);
            if (history.length > 10) {
                history.pop();
            }
            updateHistoryDisplay();
        }

        // Update history display
        function updateHistoryDisplay() {
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                list.innerHTML = '<p style="color: #a0a0a0;">No recent results</p>';
                return;
            }

            list.innerHTML = history.map(item => `
                <div class="history-item ${item.won ? 'win' : 'loss'}">
                    ${item.multiplier.toFixed(2)}x
                </div>
            `).join('');
        }

        // Auto cashout checkbox
        document.getElementById('autoCashoutEnabled').addEventListener('change', function () {
            document.getElementById('autoCashoutValue').disabled = !this.checked;
        });

        // Initialize
        loadBalance();
        connectWebSocket();
    </script>
</body>

</html>
