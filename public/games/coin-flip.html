<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetVibe - Coin Flip</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-header h1 {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .bet-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .bet-input {
            flex: 1;
            min-width: 200px;
        }

        .bet-input label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0a0a0;
        }

        .bet-input input,
        .bet-input select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        .bet-input input:focus,
        .bet-input select:focus {
            outline: none;
            border-color: #667eea;
        }

        .choice-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .choice-btn {
            flex: 1;
            padding: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .choice-btn:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .choice-btn.selected {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .choice-btn .multiplier {
            display: block;
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 0.5rem;
        }

        .play-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.02);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .coin-display {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-bottom: 1.5rem;
        }

        .coin {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            transition: transform 0.5s;
        }

        .coin.heads {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #b8860b;
            border: 4px solid #b8860b;
        }

        .coin.tails {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            color: #808080;
            border: 4px solid #808080;
        }

        .coin.flipping {
            animation: flip 1s ease-in-out;
        }

        @keyframes flip {
            0% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(1800deg);
            }

            100% {
                transform: rotateY(3600deg);
            }
        }

        .result-display {
            text-align: center;
        }

        .result-display .multiplier {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .result-display .payout {
            font-size: 1.5rem;
            color: #4ade80;
        }

        .result-display .loss {
            color: #f87171;
        }

        .history {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .history h3 {
            margin-top: 0;
            color: #a0a0a0;
        }

        .history-list {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .history-item.win {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .history-item.loss {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .balance-display {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .balance-display span {
            color: #4ade80;
            font-weight: bold;
        }

        .error-message {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Coin Flip</h1>
            <p>Fastest game - Pick Heads or Tails and win 1.9x!</p>
        </div>

        <div class="balance-display">
            Balance: <span id="balance">0.00</span> INR
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="game-area">
            <div class="bet-controls">
                <div class="bet-input">
                    <label>Bet Amount (INR)</label>
                    <input type="number" id="betAmount" value="10" min="1" step="1">
                </div>
            </div>

            <div class="choice-buttons">
                <button class="choice-btn" id="headsBtn" onclick="selectChoice('heads')">
                    Heads
                    <span class="multiplier">1.9x</span>
                </button>
                <button class="choice-btn" id="tailsBtn" onclick="selectChoice('tails')">
                    Tails
                    <span class="multiplier">1.9x</span>
                </button>
            </div>

            <button class="play-btn" id="playBtn" onclick="playGame()" disabled>Flip Coin</button>

            <div class="coin-display" id="coinDisplay">
                <div class="coin heads">H</div>
            </div>
        </div>

        <div class="history">
            <h3>Recent Results</h3>
            <div class="history-list" id="historyList">
                <p style="color: #a0a0a0;">No recent results</p>
            </div>
        </div>
    </div>

    <script>
        const GAME_SLUG = 'coin-flip';
        let balance = 0;
        let selectedChoice = null;
        let history = [];

        // Load balance on page load
        async function loadBalance() {
            try {
                const response = await fetch('/api/wallet/balance');
                const data = await response.json();
                if (data.success) {
                    balance = data.balance;
                    document.getElementById('balance').textContent = balance.toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load balance:', error);
            }
        }

        // Select choice
        function selectChoice(choice) {
            selectedChoice = choice;
            document.getElementById('headsBtn').classList.remove('selected');
            document.getElementById('tailsBtn').classList.remove('selected');
            document.getElementById(choice + 'Btn').classList.add('selected');
            document.getElementById('playBtn').disabled = false;
        }

        // Play game
        async function playGame() {
            if (!selectedChoice) {
                return;
            }

            const playBtn = document.getElementById('playBtn');
            const errorMessage = document.getElementById('errorMessage');
            const coinDisplay = document.getElementById('coinDisplay');

            playBtn.disabled = true;
            errorMessage.classList.remove('show');

            try {
                const betAmount = parseFloat(document.getElementById('betAmount').value);

                if (isNaN(betAmount) || betAmount <= 0) {
                    throw new Error('Invalid bet amount');
                }

                // Animate coin flip
                const coin = coinDisplay.querySelector('.coin');
                coin.classList.add('flipping');

                const response = await fetch(`/api/games/${GAME_SLUG}/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bet_amount: betAmount,
                        bet_data: { choice: selectedChoice }
                    })
                });

                const data = await response.json();

                // Remove flip animation
                setTimeout(() => {
                    coin.classList.remove('flipping');
                }, 1000);

                if (data.success) {
                    setTimeout(() => {
                        displayResult(data.data);
                        balance = data.data.new_balance || balance;
                        document.getElementById('balance').textContent = balance.toFixed(2);
                        addToHistory(data.data);
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Game failed');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
                playBtn.disabled = false;
            }
        }

        // Display result
        function displayResult(result) {
            const coinDisplay = document.getElementById('coinDisplay');
            const resultSide = result.result;

            coinDisplay.innerHTML = `
                <div class="coin ${resultSide}">
                    ${resultSide === 'heads' ? 'H' : 'T'}
                </div>
                <div class="result-display" style="margin-top: 1rem;">
                    <div class="multiplier" style="color: ${result.won ? '#4ade80' : '#f87171'}">
                        ${result.multiplier.toFixed(2)}x
                    </div>
                    <div class="${result.won ? 'payout' : 'loss'}">
                        ${result.won ? '+' : ''}${result.payout.toFixed(2)} INR
                    </div>
                </div>
            `;
        }

        // Add to history
        function addToHistory(result) {
            history.unshift(result);
            if (history.length > 10) {
                history.pop();
            }
            updateHistoryDisplay();
        }

        // Update history display
        function updateHistoryDisplay() {
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                list.innerHTML = '<p style="color: #a0a0a0;">No recent results</p>';
                return;
            }

            list.innerHTML = history.map(item => `
                <div class="history-item ${item.won ? 'win' : 'loss'}">
                    ${item.result.charAt(0).toUpperCase()} - ${item.multiplier.toFixed(2)}x
                </div>
            `).join('');
        }

        // Initialize
        loadBalance();
    </script>
</body>

</html>
