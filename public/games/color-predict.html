<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Predict - BetVibe</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .color-predict-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .timer-display {
            background: linear-gradient(180deg, #1a1a2e 0%, #2d2d44 100%);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 20px 0;
            text-align: center;
            border: 4px solid #6366f1;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .timer-value {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            font-family: monospace;
        }

        .timer-label {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 10px;
        }

        .round-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 10px;
            background: #2d2d44;
            border-radius: 8px;
        }

        .round-info span {
            color: #9ca3af;
        }

        .round-info strong {
            color: #fff;
        }

        .bet-controls {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .bet-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bet-input-group input {
            flex: 1;
            padding: 12px;
            background: #2d2d44;
            border: 2px solid #3d3d5c;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .color-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .color-option {
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: 3px solid transparent;
        }

        .color-option:hover {
            transform: scale(1.05);
        }

        .color-option.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .color-option.red {
            background: linear-gradient(145deg, #ef4444, #dc2626);
        }

        .color-option.green {
            background: linear-gradient(145deg, #10b981, #059669);
        }

        .color-option.violet {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
        }

        .color-option .color-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .color-option .multiplier {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
        }

        .bet-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bet-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .bet-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }

        .game-result {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .game-result.win {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
            border: 2px solid #10b981;
        }

        .game-result.lose {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.2));
            border: 2px solid #ef4444;
        }

        .result-color {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }

        .result-color.red {
            background: linear-gradient(145deg, #ef4444, #dc2626);
        }

        .result-color.green {
            background: linear-gradient(145deg, #10b981, #059669);
        }

        .result-color.violet {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
        }

        .result-amount {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-amount.win {
            color: #10b981;
        }

        .result-amount.lose {
            color: #ef4444;
        }

        .history-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .history-item {
            min-width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            font-size: 14px;
        }

        .history-item.red {
            background: linear-gradient(145deg, #ef4444, #dc2626);
        }

        .history-item.green {
            background: linear-gradient(145deg, #10b981, #059669);
        }

        .history-item.violet {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
        }
    </style>
</head>

<body>
    <div class="color-predict-container">
        <h1>🎨 Color Predict</h1>

        <div class="timer-display">
            <div class="timer-value" id="timerValue">03:00</div>
            <div class="timer-label">Time Remaining</div>
            <div class="round-info">
                <span>Round: <strong id="roundId">-</strong></span>
                <span>Status: <strong id="roundStatus">Loading...</strong></span>
            </div>
        </div>

        <div class="bet-controls">
            <div class="bet-input-group">
                <input type="number" id="betAmount" value="10" min="1" step="1" placeholder="Bet Amount">
            </div>

            <div class="color-options">
                <div class="color-option red" data-color="red">
                    <div class="color-name">Red</div>
                    <div class="multiplier">1.95x</div>
                </div>
                <div class="color-option green" data-color="green">
                    <div class="color-name">Green</div>
                    <div class="multiplier">1.95x</div>
                </div>
                <div class="color-option violet" data-color="violet">
                    <div class="color-name">Violet</div>
                    <div class="multiplier">4.5x</div>
                </div>
            </div>

            <button id="betBtn" class="bet-btn" disabled>Place Bet</button>
        </div>

        <div class="game-result" id="gameResult"></div>

        <div style="margin-top: 20px;">
            <h3 style="color: #9ca3af; margin-bottom: 10px;">Recent Results</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        const gameSlug = 'color-predict';
        let selectedColor = null;
        let currentRound = null;
        let timerInterval = null;

        // Color option selection
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                selectedColor = option.dataset.color;
                updateBetButton();
            });
        });

        // Update bet button state
        function updateBetButton() {
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            const canBet = currentRound && currentRound.status === 'betting' && selectedColor && !isNaN(betAmount) && betAmount >= 1;
            document.getElementById('betBtn').disabled = !canBet;
        }

        document.getElementById('betAmount').addEventListener('input', updateBetButton);

        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Load current round
        async function loadCurrentRound() {
            try {
                const response = await fetch(`/api/games/${gameSlug}/current-round`);
                const data = await response.json();

                if (data.success && data.round) {
                    currentRound = data.round;
                    updateRoundUI();
                }
            } catch (error) {
                console.error('Error loading round:', error);
            }
        }

        // Update round UI
        function updateRoundUI() {
            if (!currentRound) return;

            document.getElementById('roundId').textContent = currentRound.id || '-';
            document.getElementById('roundStatus').textContent = currentRound.status || 'Loading...';

            // Update timer
            if (currentRound.ends_at) {
                const endTime = new Date(currentRound.ends_at);
                const now = new Date();
                const remaining = Math.max(0, Math.floor((endTime - now) / 1000));
                document.getElementById('timerValue').textContent = formatTime(remaining);
            }

            updateBetButton();
        }

        // Start timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                if (currentRound && currentRound.ends_at) {
                    const endTime = new Date(currentRound.ends_at);
                    const now = new Date();
                    const remaining = Math.max(0, Math.floor((endTime - now) / 1000));
                    document.getElementById('timerValue').textContent = formatTime(remaining);

                    if (remaining <= 0) {
                        loadCurrentRound();
                    }
                }
            }, 1000);
        }

        // Place bet
        document.getElementById('betBtn').addEventListener('click', async () => {
            if (!selectedColor || !currentRound || currentRound.status !== 'betting') return;

            const betAmount = parseFloat(document.getElementById('betAmount').value);

            if (isNaN(betAmount) || betAmount < 1) {
                alert('Please enter a valid bet amount');
                return;
            }

            try {
                const response = await fetch(`/api/games/${gameSlug}/bet`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        bet_amount: betAmount,
                        round_id: currentRound.id,
                        bet_data: { color: selectedColor }
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Bet placed successfully!');
                    document.getElementById('gameResult').style.display = 'none';
                } else {
                    alert(data.message || 'Failed to place bet');
                }
            } catch (error) {
                console.error('Error placing bet:', error);
                alert('Failed to place bet');
            }
        });

        // Show result
        function showResult(result) {
            const gameResult = document.getElementById('gameResult');
            gameResult.style.display = 'block';

            const colorClass = result.color;

            gameResult.innerHTML = `
                <div class="result-color ${colorClass}">${result.color.charAt(0).toUpperCase() + result.color.slice(1)}</div>
            `;

            if (result.won) {
                gameResult.className = 'game-result win';
                gameResult.innerHTML += `
                    <h2>🎉 You Won!</h2>
                    <div class="result-amount win">+₹${result.profit.toFixed(2)}</div>
                    <p>Multiplier: ${result.multiplier.toFixed(2)}x</p>
                `;
            } else {
                gameResult.className = 'game-result lose';
                gameResult.innerHTML += `
                    <h2>😢 You Lost!</h2>
                    <div class="result-amount lose">-₹${result.bet_amount.toFixed(2)}</div>
                    <p>Result was ${result.color}</p>
                `;
            }
        }

        // Load history
        async function loadHistory() {
            try {
                const response = await fetch(`/api/games/${gameSlug}/history`);
                const data = await response.json();

                if (data.success && data.history) {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = data.history.slice(0, 20).map(bet => `
                        <div class="history-item ${bet.result?.color || 'red'}" title="Round ${bet.round_id}">
                            ${bet.result?.color?.charAt(0).toUpperCase() || '?'}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Initialize
        loadCurrentRound();
        startTimer();
        loadHistory();

        // Refresh round every 5 seconds
        setInterval(loadCurrentRound, 5000);
    </script>
</body>

</html>
