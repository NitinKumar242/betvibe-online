<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess - BetVibe</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .number-btn {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border: 2px solid #3a3a5e;
            border-radius: 12px;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .number-btn:hover {
            transform: translateY(-3px);
            border-color: #00ff88;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .number-btn.selected {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border-color: #00ff88;
        }

        .range-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .range-btn {
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border: 2px solid #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .range-btn:hover {
            border-color: #00ff88;
        }

        .range-btn.selected {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border-color: #00ff88;
        }

        .multiplier-badge {
            display: inline-block;
            background: #ff6b6b;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }

        .result-display {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
            animation: pulse 0.5s ease;
        }

        .result-display.win {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }

        .result-display.lose {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .history-item {
            display: inline-block;
            width: 35px;
            height: 35px;
            line-height: 35px;
            text-align: center;
            border-radius: 50%;
            background: #2a2a3e;
            color: #fff;
            font-weight: bold;
            margin: 3px;
            font-size: 14px;
        }

        .history-item.win {
            background: #00ff88;
            color: #1a1a2e;
        }

        .history-item.lose {
            background: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="game-header">
            <h1>🎯 Number Guess</h1>
            <div class="balance-display">
                Balance: <span id="balance">₹0.00</span>
            </div>
        </header>

        <div class="game-container">
            <div class="game-display">
                <div id="result" class="result-display" style="display: none;">
                    <span id="result-number"></span>
                </div>

                <div id="game-content">
                    <div class="bet-type-selector">
                        <button class="bet-type-btn active" data-type="exact">Exact Number</button>
                        <button class="bet-type-btn" data-type="range">Range Bet</button>
                    </div>

                    <div id="exact-bet-section">
                        <p class="game-info">Pick an exact number (1-10) for <span class="multiplier-badge">8x</span>
                            payout!</p>
                        <div class="number-grid" id="number-grid">
                            <button class="number-btn" data-number="1">1</button>
                            <button class="number-btn" data-number="2">2</button>
                            <button class="number-btn" data-number="3">3</button>
                            <button class="number-btn" data-number="4">4</button>
                            <button class="number-btn" data-number="5">5</button>
                            <button class="number-btn" data-number="6">6</button>
                            <button class="number-btn" data-number="7">7</button>
                            <button class="number-btn" data-number="8">8</button>
                            <button class="number-btn" data-number="9">9</button>
                            <button class="number-btn" data-number="10">10</button>
                        </div>
                    </div>

                    <div id="range-bet-section" style="display: none;">
                        <p class="game-info">Pick a range for better odds!</p>
                        <div class="range-options">
                            <button class="range-btn" data-range="1-3">1-3 <span
                                    class="multiplier-badge">2.5x</span></button>
                            <button class="range-btn" data-range="1-5">1-5 <span
                                    class="multiplier-badge">1.5x</span></button>
                            <button class="range-btn" data-range="6-10">6-10 <span
                                    class="multiplier-badge">1.5x</span></button>
                            <button class="range-btn" data-range="8-10">8-10 <span
                                    class="multiplier-badge">2.5x</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bet-controls">
                <div class="bet-input-group">
                    <label>Bet Amount (₹)</label>
                    <input type="number" id="bet-amount" value="10" min="1" step="1">
                </div>

                <div class="quick-bet-buttons">
                    <button class="quick-bet-btn" data-amount="10">₹10</button>
                    <button class="quick-bet-btn" data-amount="50">₹50</button>
                    <button class="quick-bet-btn" data-amount="100">₹100</button>
                    <button class="quick-bet-btn" data-amount="500">₹500</button>
                </div>

                <div class="potential-payout">
                    Potential Win: <span id="potential-win">₹0.00</span>
                </div>

                <button id="play-btn" class="play-btn" disabled>Place Bet</button>
            </div>

            <div class="history-section">
                <h3>Recent Results</h3>
                <div id="history" class="history-display"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedNumber = null;
        let selectedRange = null;
        let betType = 'exact';
        let isPlaying = false;

        const multipliers = {
            exact: 8,
            '1-3': 2.5,
            '1-5': 1.5,
            '6-10': 1.5,
            '8-10': 2.5
        };

        // Load balance
        function loadBalance() {
            const balance = localStorage.getItem('balance') || '1000.00';
            document.getElementById('balance').textContent = `₹${parseFloat(balance).toFixed(2)}`;
        }

        // Update potential payout
        function updatePotentialPayout() {
            const betAmount = parseFloat(document.getElementById('bet-amount').value) || 0;
            let multiplier = 0;

            if (betType === 'exact' && selectedNumber) {
                multiplier = multipliers.exact;
            } else if (betType === 'range' && selectedRange) {
                multiplier = multipliers[selectedRange];
            }

            const potentialWin = betAmount * multiplier;
            document.getElementById('potential-win').textContent = `₹${potentialWin.toFixed(2)}`;
        }

        // Bet type selector
        document.querySelectorAll('.bet-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.bet-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                betType = btn.dataset.type;

                document.getElementById('exact-bet-section').style.display = betType === 'exact' ? 'block' : 'none';
                document.getElementById('range-bet-section').style.display = betType === 'range' ? 'block' : 'none';

                selectedNumber = null;
                selectedRange = null;
                document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
                document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('selected'));

                updatePlayButton();
                updatePotentialPayout();
            });
        });

        // Number selection
        document.querySelectorAll('.number-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isPlaying) return;

                document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedNumber = parseInt(btn.dataset.number);

                updatePlayButton();
                updatePotentialPayout();
            });
        });

        // Range selection
        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isPlaying) return;

                document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedRange = btn.dataset.range;

                updatePlayButton();
                updatePotentialPayout();
            });
        });

        // Quick bet buttons
        document.querySelectorAll('.quick-bet-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('bet-amount').value = btn.dataset.amount;
                updatePotentialPayout();
            });
        });

        // Bet amount change
        document.getElementById('bet-amount').addEventListener('input', updatePotentialPayout);

        // Update play button state
        function updatePlayButton() {
            const playBtn = document.getElementById('play-btn');
            const hasSelection = betType === 'exact' ? selectedNumber !== null : selectedRange !== null;
            playBtn.disabled = !hasSelection || isPlaying;
        }

        // Play button
        document.getElementById('play-btn').addEventListener('click', async () => {
            if (isPlaying) return;

            const betAmount = parseFloat(document.getElementById('bet-amount').value);
            if (!betAmount || betAmount <= 0) {
                alert('Please enter a valid bet amount');
                return;
            }

            isPlaying = true;
            updatePlayButton();

            const betData = betType === 'exact'
                ? { type: 'exact', number: selectedNumber }
                : { type: 'range', range: selectedRange };

            try {
                const response = await fetch('/api/games/number-guess/play', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        betAmount: betAmount,
                        betData: betData
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showResult(result.data);
                    updateBalance(result.data.newBalance);
                    addToHistory(result.data);
                } else {
                    alert(result.message || 'Bet failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }

            isPlaying = false;
            updatePlayButton();
        });

        // Show result
        function showResult(data) {
            const resultDiv = document.getElementById('result');
            const resultNumber = document.getElementById('result-number');
            const gameContent = document.getElementById('game-content');

            gameContent.style.display = 'none';
            resultDiv.style.display = 'block';
            resultNumber.textContent = data.result;

            if (data.won) {
                resultDiv.className = 'result-display win';
                resultNumber.textContent = `${data.result} - WIN! ₹${data.payout.toFixed(2)}`;
            } else {
                resultDiv.className = 'result-display lose';
                resultNumber.textContent = `${data.result} - LOSE`;
            }

            setTimeout(() => {
                resultDiv.style.display = 'none';
                gameContent.style.display = 'block';
            }, 3000);
        }

        // Update balance
        function updateBalance(newBalance) {
            localStorage.setItem('balance', newBalance.toString());
            loadBalance();
        }

        // Add to history
        function addToHistory(data) {
            const historyDiv = document.getElementById('history');
            const historyItem = document.createElement('span');
            historyItem.className = `history-item ${data.won ? 'win' : 'lose'}`;
            historyItem.textContent = data.result;
            historyDiv.insertBefore(historyItem, historyDiv.firstChild);

            // Keep only last 20 results
            while (historyDiv.children.length > 20) {
                historyDiv.removeChild(historyDiv.lastChild);
            }
        }

        // Load history
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('number-guess-history') || '[]');
            const historyDiv = document.getElementById('history');

            history.forEach(item => {
                const historyItem = document.createElement('span');
                historyItem.className = `history-item ${item.won ? 'win' : 'lose'}`;
                historyItem.textContent = item.result;
                historyDiv.appendChild(historyItem);
            });
        }

        // Initialize
        loadBalance();
        loadHistory();
    </script>
</body>

</html>
