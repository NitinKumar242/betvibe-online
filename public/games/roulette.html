<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Lite - BetVibe</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .roulette-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .roulette-wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(#ef4444 0deg 9.73deg,
                    #1a1a2e 9.73deg 19.46deg,
                    #ef4444 19.46deg 29.19deg,
                    #1a1a2e 29.19deg 38.92deg,
                    #ef4444 38.92deg 48.65deg,
                    #1a1a2e 48.65deg 58.38deg,
                    #ef4444 58.38deg 68.11deg,
                    #1a1a2e 68.11deg 77.84deg,
                    #ef4444 77.84deg 87.57deg,
                    #1a1a2e 87.57deg 97.3deg,
                    #ef4444 97.3deg 107.03deg,
                    #1a1a2e 107.03deg 116.76deg,
                    #ef4444 116.76deg 126.49deg,
                    #1a1a2e 126.49deg 136.22deg,
                    #ef4444 136.22deg 145.95deg,
                    #1a1a2e 145.95deg 155.68deg,
                    #ef4444 155.68deg 165.41deg,
                    #1a1a2e 165.41deg 175.14deg,
                    #22c55e 175.14deg 184.87deg,
                    #1a1a2e 184.87deg 194.6deg,
                    #ef4444 194.6deg 204.33deg,
                    #1a1a2e 204.33deg 214.06deg,
                    #ef4444 214.06deg 223.79deg,
                    #1a1a2e 223.79deg 233.52deg,
                    #ef4444 233.52deg 243.25deg,
                    #1a1a2e 243.25deg 252.98deg,
                    #ef4444 252.98deg 262.71deg,
                    #1a1a2e 262.71deg 272.44deg,
                    #ef4444 272.44deg 282.17deg,
                    #1a1a2e 282.17deg 291.9deg,
                    #ef4444 291.9deg 301.63deg,
                    #1a1a2e 301.63deg 311.36deg,
                    #ef4444 311.36deg 321.09deg,
                    #1a1a2e 321.09deg 330.82deg,
                    #ef4444 330.82deg 340.55deg,
                    #1a1a2e 340.55deg 350.28deg,
                    #ef4444 350.28deg 360deg);
            border: 8px solid #3d3d5c;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .roulette-wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #3d3d5c;
            border-radius: 50%;
            border: 4px solid #6366f1;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #fbbf24;
            z-index: 10;
        }

        .result-display {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 12px;
        }

        .result-number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-number.red {
            color: #ef4444;
        }

        .result-number.black {
            color: #fff;
        }

        .result-number.green {
            color: #22c55e;
        }

        .bet-controls {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .bet-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .bet-input-group input {
            flex: 1;
            padding: 12px;
            background: #2d2d44;
            border: 2px solid #3d3d5c;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .bet-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .bet-option {
            padding: 15px;
            background: #2d2d44;
            border: 2px solid #3d3d5c;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .bet-option:hover {
            background: #3d3d5c;
        }

        .bet-option.selected {
            background: #6366f1;
            border-color: #818cf8;
        }

        .bet-option .multiplier {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .bet-option.red {
            background: linear-gradient(145deg, #dc2626, #991b1b);
        }

        .bet-option.black {
            background: linear-gradient(145deg, #374151, #1f2937);
        }

        .bet-option.green {
            background: linear-gradient(145deg, #16a34a, #15803d);
        }

        .play-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }

        .play-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .play-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }

        .game-result {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .game-result.win {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
            border: 2px solid #10b981;
        }

        .game-result.lose {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.2));
            border: 2px solid #ef4444;
        }

        .result-amount {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-amount.win {
            color: #10b981;
        }

        .result-amount.lose {
            color: #ef4444;
        }

        .history-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .history-item {
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }

        .history-item.red {
            background: #ef4444;
        }

        .history-item.black {
            background: #1f2937;
        }

        .history-item.green {
            background: #22c55e;
        }
    </style>
</head>

<body>
    <div class="roulette-container">
        <h1>🎰 Roulette Lite</h1>

        <div class="result-display">
            <div class="roulette-wheel" id="rouletteWheel">
                <div class="wheel-pointer"></div>
            </div>
            <div class="result-number" id="resultNumber">?</div>
            <div id="resultText" style="color: #9ca3af;">Place your bet</div>
        </div>

        <div class="bet-controls">
            <div class="bet-input-group">
                <input type="number" id="betAmount" value="10" min="1" step="1" placeholder="Bet Amount">
            </div>

            <div class="bet-options">
                <div class="bet-option red" data-bet="red">
                    Red
                    <span class="multiplier">1.9x</span>
                </div>
                <div class="bet-option black" data-bet="black">
                    Black
                    <span class="multiplier">1.9x</span>
                </div>
                <div class="bet-option green" data-bet="zero">
                    Zero
                    <span class="multiplier">17x</span>
                </div>
                <div class="bet-option" data-bet="odd">
                    Odd
                    <span class="multiplier">1.9x</span>
                </div>
                <div class="bet-option" data-bet="even">
                    Even
                    <span class="multiplier">1.9x</span>
                </div>
                <div class="bet-option" data-bet="high">
                    High (19-36)
                    <span class="multiplier">1.9x</span>
                </div>
                <div class="bet-option" data-bet="low">
                    Low (1-18)
                    <span class="multiplier">1.9x</span>
                </div>
            </div>

            <button id="playBtn" class="play-btn" disabled>Place Bet</button>
        </div>

        <div class="game-result" id="gameResult"></div>

        <div style="margin-top: 20px;">
            <h3 style="color: #9ca3af; margin-bottom: 10px;">Recent Results</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        const gameSlug = 'roulette';
        let selectedBet = null;
        let isSpinning = false;

        // Roulette numbers and colors
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        const blackNumbers = [2, 4, 6, 8, 10, 11, 13, 15, 17, 20, 22, 24, 26, 28, 29, 31, 33, 35];

        // Bet option selection
        document.querySelectorAll('.bet-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.bet-option').forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                selectedBet = option.dataset.bet;
                updatePlayButton();
            });
        });

        // Update play button state
        function updatePlayButton() {
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            document.getElementById('playBtn').disabled = !selectedBet || isNaN(betAmount) || betAmount < 1 || isSpinning;
        }

        document.getElementById('betAmount').addEventListener('input', updatePlayButton);

        // Play game
        document.getElementById('playBtn').addEventListener('click', async () => {
            if (isSpinning || !selectedBet) return;

            const betAmount = parseFloat(document.getElementById('betAmount').value);

            if (isNaN(betAmount) || betAmount < 1) {
                alert('Please enter a valid bet amount');
                return;
            }

            isSpinning = true;
            updatePlayButton();

            // Spin animation
            const wheel = document.getElementById('rouletteWheel');
            const spins = 5 + Math.random() * 3;
            const rotation = spins * 360 + Math.random() * 360;
            wheel.style.transform = `rotate(${rotation}deg)`;

            try {
                const response = await fetch(`/api/games/${gameSlug}/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        bet_amount: betAmount,
                        bet_type: selectedBet
                    })
                });

                const data = await response.json();

                // Wait for spin animation
                await new Promise(resolve => setTimeout(resolve, 3000));

                if (data.success) {
                    showResult(data.result);
                    loadHistory();
                } else {
                    alert(data.message || 'Failed to place bet');
                    isSpinning = false;
                    updatePlayButton();
                }
            } catch (error) {
                console.error('Error playing game:', error);
                alert('Failed to place bet');
                isSpinning = false;
                updatePlayButton();
            }
        });

        // Show result
        function showResult(result) {
            const resultNumber = document.getElementById('resultNumber');
            const resultText = document.getElementById('resultText');
            const gameResult = document.getElementById('gameResult');

            // Determine color
            let colorClass = 'green';
            if (redNumbers.includes(result.number)) {
                colorClass = 'red';
            } else if (blackNumbers.includes(result.number)) {
                colorClass = 'black';
            }

            resultNumber.textContent = result.number;
            resultNumber.className = `result-number ${colorClass}`;

            gameResult.style.display = 'block';

            if (result.won) {
                gameResult.className = 'game-result win';
                gameResult.innerHTML = `
                    <h2>🎉 You Won!</h2>
                    <div class="result-amount win">+₹${result.profit.toFixed(2)}</div>
                    <p>Result: ${result.number} (${colorClass})</p>
                `;
                resultText.textContent = `You won ₹${result.profit.toFixed(2)}!`;
            } else {
                gameResult.className = 'game-result lose';
                gameResult.innerHTML = `
                    <h2>😢 You Lost!</h2>
                    <div class="result-amount lose">-₹${result.bet_amount.toFixed(2)}</div>
                    <p>Result: ${result.number} (${colorClass})</p>
                `;
                resultText.textContent = `Result was ${result.number} (${colorClass})`;
            }

            isSpinning = false;
            updatePlayButton();
        }

        // Load history
        async function loadHistory() {
            try {
                const response = await fetch(`/api/games/${gameSlug}/history`);
                const data = await response.json();

                if (data.success && data.history) {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = data.history.slice(0, 20).map(bet => {
                        let colorClass = 'green';
                        if (redNumbers.includes(bet.result?.number)) {
                            colorClass = 'red';
                        } else if (blackNumbers.includes(bet.result?.number)) {
                            colorClass = 'black';
                        }

                        return `
                            <div class="history-item ${colorClass}" title="Bet: ${bet.bet_type} | ${bet.won ? 'Won' : 'Lost'}">
                                ${bet.result?.number || '?'}
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Initialize
        loadHistory();
    </script>
</body>

</html>
