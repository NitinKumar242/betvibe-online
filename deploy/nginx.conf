# BetVibe Nginx Configuration
# Place this in /etc/nginx/sites-available/betvibe

# Rate limiting zone for /api/auth/ endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name betsvibe.online www.betsvibe.online;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name betsvibe.online www.betsvibe.online;

    root /var/www/betvibe/public;
    index index.php;

    # SSL Configuration (certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/betsvibe.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/betsvibe.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/betvibe_access.log;
    error_log /var/log/nginx/betvibe_error.log;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Rate limiting for auth endpoints
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets with caching (30 days as per requirements)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Deny access to sensitive directories
    location ~* ^/(app|config|storage|vendor|cron|websocket|telegram)/ {
        deny all;
        return 404;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /(\.env|composer\.json|composer\.lock|package\.json|package-lock\.json)$ {
        deny all;
    }

    # WebSocket proxy (if using nginx for WebSocket)
    location /ws {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Telegram webhook (allowed access)
    location /telegram/webhook {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/telegram/webhook.php;
        include fastcgi_params;
    }
}
