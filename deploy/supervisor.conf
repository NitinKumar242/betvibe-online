# BetVibe Supervisor Configuration
# Place this in /etc/supervisor/conf.d/betvibe.conf

[program:betvibe-ws]
command=/usr/bin/php /var/www/betvibe/websocket/server.php
directory=/var/www/betvibe
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/betvibe/storage/logs/websocket.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=10
environment=PATH="/usr/bin:/usr/local/bin"

[program:betvibe-round-timer]
command=/usr/bin/php /var/www/betvibe/cron/round_timer.php
directory=/var/www/betvibe
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/betvibe/storage/logs/round_timer.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=10
environment=PATH="/usr/bin:/usr/local/bin"

[group:betvibe]
programs=betvibe-ws,betvibe-round-timer
priority=999
